# AWS CodeBuild build specification — shared for test and production
# Configure one CodePipeline/CodeBuild pair per branch:
#   test -> deploy to test environment
#   main -> deploy to production environment
#
# Example environment variables for the test CodeBuild project:
#   S3_BUCKET=ungap-expo-test
#   CLOUDFRONT_DISTRIBUTION_ID=E1S709XQKON91E
#   APP_DOMAIN=expo-test.ungap.net
#   AWS_DEFAULT_REGION=eu-west-1
#
# Example environment variables for the production CodeBuild project:
#   S3_BUCKET=ungap-expo-production
#   CLOUDFRONT_DISTRIBUTION_ID=E3AIG9D21U1T68
#   APP_DOMAIN=expo.ungap.net
#   AWS_DEFAULT_REGION=eu-west-1
#
# The IAM role attached to this CodeBuild project must have:
#   s3:PutObject, s3:DeleteObject, s3:ListBucket on the target S3 bucket
#   cloudfront:CreateInvalidation on the target CloudFront distribution

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci

  pre_build:
    commands:
      - ': "${S3_BUCKET:?S3_BUCKET must be set in the CodeBuild project}"'
      - ': "${CLOUDFRONT_DISTRIBUTION_ID:?CLOUDFRONT_DISTRIBUTION_ID must be set in the CodeBuild project}"'
      - ': "${AWS_DEFAULT_REGION:?AWS_DEFAULT_REGION must be set in the CodeBuild project}"'

  build:
    commands:
      - npm run export:web

  post_build:
    commands:
      # Upload hashed JS/CSS/image assets with long-lived immutable cache
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --delete \
          --region $AWS_DEFAULT_REGION \
          --cache-control "public, max-age=31536000, immutable" \
          --exclude "index.html" \
          --exclude "*.json"
      # Upload index.html with no-cache so browsers always fetch the latest version
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --region $AWS_DEFAULT_REGION \
          --cache-control "no-cache, no-store, must-revalidate" \
          --content-type "text/html; charset=utf-8" \
          --exclude "*" \
          --include "index.html"
      # Upload JSON manifests with no-cache
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --region $AWS_DEFAULT_REGION \
          --cache-control "no-cache, no-store, must-revalidate" \
          --exclude "*" \
          --include "*.json"
      # Invalidate only index.html — hashed assets never need invalidation
      - |
        aws cloudfront create-invalidation \
          --region us-east-1 \
          --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
          --paths "/index.html"

artifacts:
  files:
    - "dist/**/*"
  base-directory: .
