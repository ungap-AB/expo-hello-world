# AWS CodeBuild build specification — test environment
# Environment: test
# Branch:      test
# S3 bucket:   ungap-expo-test
# CloudFront:  E3SMJU8Z3AOPRM
# Domain:      expo-test.ungap.net
# Region:      eu-west-1
#
# The IAM role attached to this CodeBuild project must have:
#   s3:PutObject, s3:DeleteObject, s3:ListBucket on arn:aws:s3:::ungap-expo-test
#   cloudfront:CreateInvalidation on arn:aws:cloudfront::ACCOUNT_ID:distribution/E3SMJU8Z3AOPRM

version: 0.2

env:
  variables:
    S3_BUCKET: ungap-expo-test
    CLOUDFRONT_DISTRIBUTION_ID: E3SMJU8Z3AOPRM
    AWS_DEFAULT_REGION: eu-west-1

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci

  build:
    commands:
      - npm run export:web

  post_build:
    commands:
      # Upload hashed JS/CSS/image assets with long-lived immutable cache
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --delete \
          --region $AWS_DEFAULT_REGION \
          --cache-control "public, max-age=31536000, immutable" \
          --exclude "index.html" \
          --exclude "*.json"
      # Upload index.html with no-cache so browsers always fetch the latest version
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --region $AWS_DEFAULT_REGION \
          --cache-control "no-cache, no-store, must-revalidate" \
          --content-type "text/html; charset=utf-8" \
          --exclude "*" \
          --include "index.html"
      # Upload JSON manifests with no-cache
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --region $AWS_DEFAULT_REGION \
          --cache-control "no-cache, no-store, must-revalidate" \
          --exclude "*" \
          --include "*.json"
      # Invalidate only index.html — hashed assets never need invalidation
      - |
        aws cloudfront create-invalidation \
          --region us-east-1 \
          --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
          --paths "/index.html"

artifacts:
  files:
    - "dist/**/*"
  base-directory: .
