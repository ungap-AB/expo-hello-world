# AWS CodeBuild build specification
# One CodeBuild project per environment. Each project sets the following
# environment variables via the CodePipeline / CodeBuild console:
#   S3_BUCKET                  - target S3 bucket name
#   CLOUDFRONT_DISTRIBUTION_ID - target CloudFront distribution ID
# The IAM role attached to the CodeBuild project must have:
#   s3:PutObject, s3:DeleteObject, s3:ListBucket on the target bucket
#   cloudfront:CreateInvalidation on the target distribution

version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - npm ci

  build:
    commands:
      - npm run export:web

  post_build:
    commands:
      # Upload hashed assets with long-lived immutable cache
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --delete \
          --region $AWS_DEFAULT_REGION \
          --cache-control "public, max-age=31536000, immutable" \
          --exclude "index.html" \
          --exclude "*.json"
      # Upload index.html and manifests with no-cache so browsers always fetch the latest
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --region $AWS_DEFAULT_REGION \
          --include "index.html" \
          --include "*.json" \
          --cache-control "no-cache, no-store, must-revalidate" \
          --content-type "text/html; charset=utf-8" \
          --exclude "*" \
          --include "index.html"
      - |
        aws s3 sync dist/ s3://$S3_BUCKET \
          --region $AWS_DEFAULT_REGION \
          --include "*.json" \
          --cache-control "no-cache, no-store, must-revalidate" \
          --exclude "*" \
          --include "*.json"
      # Invalidate only index.html — hashed assets never need invalidation
      - |
        aws cloudfront create-invalidation \
          --distribution-id $CLOUDFRONT_DISTRIBUTION_ID \
          --paths "/index.html"

artifacts:
  files:
    - "dist/**/*"
  base-directory: .
