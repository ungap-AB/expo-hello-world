# Build and deployment environment configuration
# Used by AWS CodePipeline / CodeBuild to deploy the Expo web app.
# Each environment maps to a dedicated S3 bucket and CloudFront distribution.
# The matching pipeline is triggered by the configured source branch.

aws_region: eu-west-1

environments:
  test:
    branch: test
    domain: expo-test.ungap.net
    s3_bucket: ungap-expo-test
    cloudfront_distribution_id: E3SMJU8Z3AOPRM
    require_approval: false

  staging:
    branch: staging
    domain: expo-staging.ungap.com
    s3_bucket: ungap-expo-staging
    cloudfront_distribution_id: E1S709XQKON91E
    require_approval: false

  production:
    branch: main
    domain: expo.ungap.net
    s3_bucket: ungap-expo-production
    cloudfront_distribution_id: E3AIG9D21U1T68
    require_approval: true
